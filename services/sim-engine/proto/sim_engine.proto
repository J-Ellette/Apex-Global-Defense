syntax = "proto3";

package agd.sim;

// ── Schema version ──────────────────────────────────────────────────────────
// REST/gRPC contract: v1.3.0  (see docs/contract-governance.md)
// Breaking changes require a major-version bump and a migration window.
// Additive changes increment the minor version.

message GeoPoint {
  double lat = 1;
  double lng = 2;
}

message ScenarioConfig {
  string mode = 1;
  repeated string blue_force_ids = 2;
  repeated string red_force_ids = 3;
  string theater_bounds_json = 4;
  string start_time_iso = 5;
  int32 duration_hours = 6;
  int32 monte_carlo_runs = 7;
  string weather_preset = 8;
  bool fog_of_war = 9;
  bool terrain_effects = 10;
  // v1.1+: deterministic seed for replay / branch support (0 = auto-derive from run_id)
  int64 seed = 11;
  // v1.3+: terrain preset applied to the theater (flat|urban|mountainous|jungle|desert)
  string terrain_preset = 12;
}

message SimRequest {
  string run_id = 1;
  ScenarioConfig config = 2;
  bytes initial_state = 3;
}

enum EventType {
  UNIT_MOVE = 0;
  ENGAGEMENT = 1;
  CASUALTY = 2;
  SUPPLY_CONSUMED = 3;
  OBJECTIVE_CAPTURED = 4;
  AIRSTRIKE = 5;
  NAVAL_ACTION = 6;
  CYBER_ATTACK = 7;
  CBRN_RELEASE = 8;
  PHASE_CHANGE = 9;
  RESUPPLY = 10;
}

message SimEvent {
  string run_id = 1;
  int64 timestamp_ms = 2;
  int32 turn_number = 3;
  EventType type = 4;
  string entity_id = 5;
  GeoPoint location = 6;
  bytes payload = 7;
}

message RunRef {
  string run_id = 1;
  // v1.2+: optional turn number for checkpoint retrieval (0 = latest)
  int32 turn = 2;
}

message RunStatus {
  string run_id = 1;
  string status = 2;
  double progress = 3;
  string message = 4;
}

// v1.1+: Aggregated status for one side (blue or red).
message ForceStatus {
  int32 unit_count = 1;
  double strength_pct = 2;     // current / initial strength [0, 1]
  int32 total_kia = 3;
  int32 total_wia = 4;
  double supply_ammo = 5;      // fraction remaining [0, 1]
  double supply_fuel = 6;
  double supply_rations = 7;
  // JSON map: equipment category → loss count (e.g. {"armor": 3, "artillery": 1})
  string equipment_losses_json = 8;
  int32 objectives_held = 9;
}

message SimState {
  string run_id = 1;
  string status = 2;
  double progress = 3;
  int32 turn_number = 4;
  int64 sim_time_ms = 5;
  int32 blue_unit_count = 6;
  int32 red_unit_count = 7;
  string objectives_status_json = 8;
  // v1.1+: per-side force status for richer dashboard display
  ForceStatus blue_force = 9;
  ForceStatus red_force = 10;
  // v1.2+: opaque snapshot blob for deterministic replay / branch support
  bytes snapshot = 11;
}

message EventInjection {
  string run_id = 1;
  string event_type = 2;
  bytes payload = 3;
}

message Ack {
  bool ok = 1;
  string message = 2;
}

service SimEngine {
  rpc RunScenario(SimRequest) returns (stream SimEvent);
  rpc PauseRun(RunRef) returns (RunStatus);
  rpc ResumeRun(RunRef) returns (RunStatus);
  rpc StepTurn(RunRef) returns (SimEvent);
  rpc GetState(RunRef) returns (SimState);
  rpc InjectEvent(EventInjection) returns (Ack);
  // v1.2+: retrieve a turn snapshot for replay or branch-on-turn
  rpc GetCheckpoint(RunRef) returns (SimState);
}