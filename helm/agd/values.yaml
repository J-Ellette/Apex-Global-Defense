# Apex Global Defense — Helm chart default values

# Global settings
global:
  # Image registry (override for air-gap, e.g. "registry.local:5000")
  imageRegistry: ""
  imagePullSecrets: []

# Air-gap mode: skips any outbound network calls in init containers / health checks
airgap: false

# Classification level label applied to all pods (UNCLASSIFIED | CUI | SECRET | TOP SECRET)
classificationLevel: "UNCLASSIFIED"

namespace: agd

# ── Infrastructure ────────────────────────────────────────────────────────────

postgres:
  image:
    repository: postgis/postgis
    tag: "16-3.4"
    pullPolicy: IfNotPresent
  database: agd
  username: agd
  # password is stored in secret.yaml; set via --set postgres.password=...
  password: ""
  storage: 20Gi
  storageClass: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

redis:
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

elasticsearch:
  image:
    repository: elasticsearch
    tag: "8.12.0"
    pullPolicy: IfNotPresent
  storage: 10Gi
  storageClass: ""
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

ollama:
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  storage: 40Gi
  storageClass: ""
  # Models to pull on first boot (ignored in air-gap mode; use airgap-load.sh)
  models:
    - llama3
    - mistral
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 16Gi

keycloak:
  image:
    repository: quay.io/keycloak/keycloak
    tag: "24.0.1"
    pullPolicy: IfNotPresent
  adminUser: admin
  # adminPassword stored in secret; set via --set keycloak.adminPassword=...
  adminPassword: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

mbtiles:
  image:
    repository: ghcr.io/consbio/mbtileserver
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

