# ── JWT secret (placeholder — always override in production) ──────────────────
jwt:
  secret: "CHANGE_ME_IN_PRODUCTION"

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: agd.local
  tls:
    enabled: false
    secretName: agd-tls
  annotations: {}
