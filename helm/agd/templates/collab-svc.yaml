---
apiVersion: v1
kind: Service
metadata:
  name: collab-svc
  namespace: {{ include "agd.namespace" . }}
  labels:
    {{- include "agd.labels" . | nindent 4 }}
    app.kubernetes.io/name: collab-svc
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.collabSvc.port }}
      targetPort: {{ .Values.collabSvc.port }}
      name: http
  selector:
    app.kubernetes.io/name: collab-svc
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collab-svc
  namespace: {{ include "agd.namespace" . }}
  labels:
    {{- include "agd.labels" . | nindent 4 }}
    app.kubernetes.io/name: collab-svc
spec:
  replicas: {{ .Values.collabSvc.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: collab-svc
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: collab-svc
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: collab-svc
          image: {{ include "agd.image" (dict "img" .Values.collabSvc.image "context" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.collabSvc.port }}
          env:
            - name: PORT
              value: {{ .Values.collabSvc.port | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agd-secrets
                  key: jwt-secret
          envFrom:
            - configMapRef:
                name: agd-config
          resources:
            {{- toYaml .Values.collabSvc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.collabSvc.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.collabSvc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
