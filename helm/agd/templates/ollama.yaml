---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ include "agd.namespace" . }}
  labels:
    {{- include "agd.labels" . | nindent 4 }}
    app.kubernetes.io/name: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      name: http
  selector:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ollama
  namespace: {{ include "agd.namespace" . }}
  labels:
    {{- include "agd.labels" . | nindent 4 }}
    app.kubernetes.io/name: ollama
spec:
  serviceName: ollama
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.airgap }}
      initContainers:
        - name: pull-models
          image: {{ include "agd.image" (dict "img" .Values.ollama.image "context" .) }}
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              ollama serve &
              sleep 5
              {{- range .Values.ollama.models }}
              ollama pull {{ . }} || true
              {{- end }}
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
      {{- end }}
      containers:
        - name: ollama
          image: {{ include "agd.image" (dict "img" .Values.ollama.image "context" .) }}
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: ollama-models
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.ollama.storageClass }}
        storageClassName: {{ .Values.ollama.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.ollama.storage }}
