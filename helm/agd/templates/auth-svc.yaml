---
apiVersion: v1
kind: Service
metadata:
  name: auth-svc
  namespace: {{ include "agd.namespace" . }}
  labels:
    {{- include "agd.labels" . | nindent 4 }}
    app.kubernetes.io/name: auth-svc
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.authSvc.port }}
      targetPort: {{ .Values.authSvc.port }}
      name: http
  selector:
    app.kubernetes.io/name: auth-svc
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-svc
  namespace: {{ include "agd.namespace" . }}
  labels:
    {{- include "agd.labels" . | nindent 4 }}
    app.kubernetes.io/name: auth-svc
spec:
  replicas: {{ .Values.authSvc.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-svc
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-svc
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: auth-svc
          image: {{ include "agd.image" (dict "img" .Values.authSvc.image "context" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.authSvc.port }}
          env:
            - name: PORT
              value: {{ .Values.authSvc.port | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agd-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agd-secrets
                  key: jwt-secret
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:$(DB_PASSWORD)@postgres:5432/{{ .Values.postgres.database }}"
          envFrom:
            - configMapRef:
                name: agd-config
          resources:
            {{- toYaml .Values.authSvc.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.authSvc.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.authSvc.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
