services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: agd_dev
      POSTGRES_USER: agd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agd -d agd_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  mbtiles-server:
    image: ghcr.io/consbio/mbtileserver:latest
    volumes:
      - ./tiles:/tilesets
    ports:
      - "8081:8080"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-adminpass}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/agd_dev
      KC_DB_USERNAME: agd
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import

  auth-svc:
    build:
      context: ./services/auth-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev?sslmode=disable
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: agd
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8080"
      ENV: development
    ports:
      - "8082:8080"
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  oob-svc:
    build:
      context: ./services/oob-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8080"
      ENV: development
    ports:
      - "8083:8080"
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  sim-orchestrator:
    build:
      context: ./services/sim-orchestrator
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      REDIS_URL: redis://redis:6379
      SIM_ENGINE_GRPC_ADDR: sim-engine:50051
      USE_GRPC_SIM_ENGINE: "true"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8085:8000"
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sim-engine:
        condition: service_healthy
      auth-svc:
        condition: service_started

  sim-engine:
    build:
      context: ./services/sim-engine
      dockerfile: Dockerfile
    environment:
      SIM_ENGINE_HOST: 0.0.0.0
      SIM_ENGINE_PORT: "50051"
    ports:
      - "50051:50051"
    restart: on-failure:5
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "50051"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  cyber-svc:
    build:
      context: ./services/cyber-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8086:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  cbrn-svc:
    build:
      context: ./services/cbrn-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8087:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  asym-svc:
    build:
      context: ./services/asym-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8088:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  terror-svc:
    build:
      context: ./services/terror-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8089:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  intel-svc:
    build:
      context: ./services/intel-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8090:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  civilian-svc:
    build:
      context: ./services/civilian-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8091:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  reporting-svc:
    build:
      context: ./services/reporting-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8092:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  econ-svc:
    build:
      context: ./services/econ-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8093:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  infoops-svc:
    build:
      context: ./services/infoops-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8094:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  gis-export-svc:
    build:
      context: ./services/gis-export-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8095:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  training-svc:
    build:
      context: ./services/training-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:${POSTGRES_PASSWORD:-devpass}@postgres:5432/agd_dev
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8000"
      ENV: development
    ports:
      - "8096:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  collab-svc:
    build:
      context: ./services/collab-svc
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      PORT: "8080"
      ENV: development
    ports:
      - "8084:8080"
    depends_on:
      redis:
        condition: service_healthy
      auth-svc:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8082/api/v1
      VITE_OOB_API_URL: http://localhost:8083/api/v1
      VITE_SIM_API_URL: http://localhost:8085/api/v1
      VITE_CYBER_API_URL: http://localhost:8086/api/v1
      VITE_CBRN_API_URL: http://localhost:8087/api/v1
      VITE_ASYM_API_URL: http://localhost:8088/api/v1
      VITE_TERROR_API_URL: http://localhost:8089/api/v1
      VITE_INTEL_API_URL: http://localhost:8090/api/v1
      VITE_CIVILIAN_API_URL: http://localhost:8091/api/v1
      VITE_REPORTING_API_URL: http://localhost:8092/api/v1
      VITE_ECON_API_URL: http://localhost:8093/api/v1
      VITE_INFOOPS_API_URL: http://localhost:8094/api/v1
      VITE_GIS_API_URL: http://localhost:8095/api/v1
      VITE_TRAINING_API_URL: http://localhost:8096/api/v1
      VITE_TILE_SERVER: http://localhost:8081
      VITE_WS_URL: ws://localhost:8084
      VITE_AIRGAP: "false"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - auth-svc

  # ---------------------------------------------------------------------------
  # Observability stack — Prometheus, Grafana, Jaeger
  # Optional: comment out to reduce resource usage.
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:9090/-/healthy | grep -q Healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      # DEV DEFAULT: Change GRAFANA_ADMIN_PASSWORD in .env (or via env var) before
      # exposing to any non-localhost network. Never commit a real password here.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-adminpass}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3000/api/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP receiver (set OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:14269/ | grep -q \":14269\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  es_data:
  zookeeper_data:
  ollama_models:
  prometheus_data:
  grafana_data:

networks:
  default:
    driver: bridge
    enable_ipv6: false
