services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: agd_dev
      POSTGRES_USER: agd
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agd -d agd_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  mbtiles-server:
    image: ghcr.io/consbio/mbtileserver:latest
    volumes:
      - ./tiles:/tilesets
    ports:
      - "8081:8080"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminpass
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/agd_dev
      KC_DB_USERNAME: agd
      KC_DB_PASSWORD: devpass
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./keycloak/realms:/opt/keycloak/data/import

  auth-svc:
    build:
      context: ./services/auth-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://agd:devpass@postgres:5432/agd_dev?sslmode=disable
      REDIS_URL: redis://redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: agd
      JWT_SECRET: dev-secret-change-in-prod
      PORT: "8080"
      ENV: development
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  oob-svc:
    build:
      context: ./services/oob-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://agd:devpass@postgres:5432/agd_dev?sslmode=disable
      JWT_SECRET: dev-secret-change-in-prod
      PORT: "8080"
      ENV: development
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  sim-orchestrator:
    build:
      context: ./services/sim-orchestrator
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:devpass@postgres:5432/agd_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
      PORT: "8000"
      ENV: development
    ports:
      - "8085:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-svc:
        condition: service_started

  cyber-svc:
    build:
      context: ./services/cyber-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://agd:devpass@postgres:5432/agd_dev
      JWT_SECRET: dev-secret-change-in-prod
      PORT: "8000"
      ENV: development
    ports:
      - "8086:8000"
    depends_on:
      postgres:
        condition: service_healthy
      auth-svc:
        condition: service_started

  collab-svc:
    build:
      context: ./services/collab-svc
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
      PORT: "8080"
      ENV: development
    ports:
      - "8084:8080"
    depends_on:
      redis:
        condition: service_healthy
      auth-svc:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8082/api/v1
      VITE_OOB_API_URL: http://localhost:8083/api/v1
      VITE_SIM_API_URL: http://localhost:8085/api/v1
      VITE_CYBER_API_URL: http://localhost:8086/api/v1
      VITE_TILE_SERVER: http://localhost:8081
      VITE_WS_URL: ws://localhost:8084
      VITE_AIRGAP: "false"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - auth-svc

volumes:
  postgres_data:
  es_data:
  zookeeper_data:
  ollama_models:
