name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Default to read-only permissions; individual jobs grant additional access as needed.
permissions:
  contents: read

jobs:
  guard-services:
    name: Guard — Service List Consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check service list matches services/ directory
        run: make guard-services

  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    needs: guard-services
    permissions:
      contents: read
    strategy:
      matrix:
        service: [auth-svc, oob-svc, collab-svc]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: services/${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}

  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    needs: guard-services
    permissions:
      contents: read
    strategy:
      matrix:
        service:
          [
            sim-orchestrator,
            cyber-svc,
            cbrn-svc,
            asym-svc,
            terror-svc,
            intel-svc,
            civilian-svc,
            reporting-svc,
            econ-svc,
            infoops-svc,
            gis-export-svc,
            training-svc,
          ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        working-directory: services/${{ matrix.service }}
        run: ruff check .

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: pytest --cov --cov-report=xml

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Test
        working-directory: frontend
        run: npm test -- --watchAll=false --coverage

      - name: Build
        working-directory: frontend
        run: npm run build

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-go, test-python, test-frontend]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
          docker compose -f docker-compose.test.yml down -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test-go, test-python, test-frontend]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      matrix:
        language: [go, javascript, python]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - auth-svc
          - oob-svc
          - collab-svc
          - sim-orchestrator
          - sim-engine
          - cyber-svc
          - cbrn-svc
          - asym-svc
          - terror-svc
          - intel-svc
          - civilian-svc
          - reporting-svc
          - econ-svc
          - infoops-svc
          - gis-export-svc
          - training-svc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
