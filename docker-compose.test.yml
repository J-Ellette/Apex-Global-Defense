  # Smoke-test runner — exercises /health on every service and exits 0 on success.
  integration-test-runner:
    image: curlimages/curl:8.7.1
    depends_on:
      auth-svc:
        condition: service_healthy
      oob-svc:
        condition: service_healthy
      collab-svc:
        condition: service_healthy
      cyber-svc:
        condition: service_healthy
      cbrn-svc:
        condition: service_healthy
      asym-svc:
        condition: service_healthy
      terror-svc:
        condition: service_healthy
      intel-svc:
        condition: service_healthy
      civilian-svc:
        condition: service_healthy
      reporting-svc:
        condition: service_healthy
      econ-svc:
        condition: service_healthy
      infoops-svc:
        condition: service_healthy
      gis-export-svc:
        condition: service_healthy
      training-svc:
        condition: service_healthy
      sim-orchestrator:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        set -e
        echo "=== AGD Integration Health Check ==="
        for url in \
          http://auth-svc:8080/health \
          http://oob-svc:8080/health \
          http://collab-svc:8080/health \
          http://cyber-svc:8000/health \
          http://cbrn-svc:8000/health \
          http://asym-svc:8000/health \
          http://terror-svc:8000/health \
          http://intel-svc:8000/health \
          http://civilian-svc:8000/health \
          http://reporting-svc:8000/health \
          http://econ-svc:8000/health \
          http://infoops-svc:8000/health \
          http://gis-export-svc:8000/health \
          http://training-svc:8000/health \
          http://sim-orchestrator:8000/health; do
          echo -n "  GET $url ... "
          curl -sf "$url" && echo "OK" || (echo "FAIL" && exit 1)
        done
        echo "=== All health checks passed ==="
