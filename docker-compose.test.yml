# Integration test harness.
# Starts the minimum infrastructure and all backend services, runs health checks,
# then exits.  Used by the CI integration-test job:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#   docker compose -f docker-compose.test.yml down -v

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: agd_test
      POSTGRES_USER: agd
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpass}
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agd -d agd_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-svc:
    build:
      context: ./services/auth-svc
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://agd:${POSTGRES_PASSWORD:-testpass}@postgres:5432/agd_test?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-test-secret-not-for-prod}
      PORT: "8080"
      ENV: test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  oob-svc:
